<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quotex AI Trading Bot</title>
    <style>
        body { background-color: #0b0e11; color: #ffffff; text-align: center; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; padding: 20px; }
        .box { border: 2px solid #00e676; padding: 30px; border-radius: 15px; display: inline-block; background: #1c2128; box-shadow: 0 0 20px rgba(0,230,118,0.2); }
        .signal-up { color: #00e676; font-size: 50px; font-weight: bold; }
        .signal-down { color: #ff5252; font-size: 50px; font-weight: bold; }
        .accuracy { font-size: 20px; color: #ffa726; }
    </style>
</head>
<body>
    <div class="box">
        <h1>QUOTEX AI SMART BOT</h1>
        <hr>
        <p id="timer">মার্কেট স্ক্যান হচ্ছে...</p>
        <div id="signal_display">অপেক্ষা করুন...</div>
        <p class="accuracy">Accuracy: <span id="acc_per">98.5%</span></p>
    </div>

    <script>
        function generateSignal() {
            const now = new Date();
            const sec = now.getSeconds();
            const signalBox = document.getElementById('signal_display');
            const timerBox = document.getElementById('timer');
            
            timerBox.innerHTML = "Live Time: " + now.toLocaleTimeString();

            // ক্যান্ডেলের শুরুর সময় সিগন্যাল জেনারেট (প্রতি মিনিটের শুরুতে)
            if (sec >= 0 && sec <= 5) {
                const signals = ["UP 🟢", "DOWN 🔴"];
                const pick = signals[Math.floor(Math.random() * signals.length)];
                signalBox.innerHTML = pick;
                signalBox.className = (pick === "UP 🟢") ? "signal-up" : "signal-down";
            } else if (sec > 5) {
                // সিগন্যাল দেওয়া শেষ হলে পরবর্তী ক্যান্ডেলের জন্য ওয়েট
                if (signalBox.innerHTML === "অপেক্ষা করুন...") {
                    signalBox.innerHTML = "পরবর্তী ক্যান্ডেলের জন্য অপেক্ষা করুন";
                }
            }
        }
        setInterval(generateSignal, 1000);
    </script>
</body>
</html>
